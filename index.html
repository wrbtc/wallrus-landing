<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Wallrus</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: #b0b0b0;
            font-family: 'IBM Plex Mono', 'JetBrains Mono', 'Fira Code', monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
        }
        .landing {
            text-align: center;
            max-width: 480px;
        }
        .wordmark {
            font-size: 2.5rem;
            font-weight: 700;
            color: #e0e0e0;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 1rem;
        }
        .tagline {
            font-size: 0.95rem;
            color: #666;
            margin-bottom: 2.5rem;
            line-height: 1.5;
        }
        .landing a {
            color: #5ba3a8;
            text-decoration: none;
            font-size: 0.9rem;
            border: 1px solid #2a4a4c;
            padding: 0.6rem 1.4rem;
            transition: all 0.2s;
        }
        .landing a:hover {
            background: #5ba3a810;
            border-color: #5ba3a8;
            color: #7cc5ca;
        }
    </style>
</head>
<body>
    <div class="landing">
        <div class="wordmark">Wallrus</div>
        <p class="tagline">AI-native trading research.</p>
        <a href="https://intel.wallrus.org">Read the Intel Briefing &rarr;</a>
    </div>
</body>
</html>
